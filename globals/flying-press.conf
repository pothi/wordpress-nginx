# To improve the perf, let's use open_file_cache
# ref: nginx.org/r/open_file_cache
# open_file_cache               max=1000;
# open_file_cache_valid     60s;
# open_file_cache_min_uses  2;
# open_file_cache_errors        off;

# based on https://docs.flyingpress.com/articles/11406112

# headers for cached content
location ~* \.html\.gz$ {
    internal;
    gzip off;
    default_type "text/html; charset=UTF-8";
    add_header x-flying-press-cache HIT;
    add_header x-flying-press-source "Nginx";
    add_header CDN-Cache-Control "max-age=2592000";
    add_header Cache-Tag $host;
    add_header Content-Encoding gzip;

    # include "globals/hsts.conf";
    include 'globals/security-headers.conf';

    expires 10m;
    add_header "Cache-Control" "must-revalidate";

    # For proxies
    add_header "Cache-Control" "s-maxage=600";
}

location / {
    error_page 418 = @fallback;
    error_page 419 = @mobileaccess;
    recursive_error_pages on;

    # bypass POST requests
    if ($request_method = POST) { return 418; }

    # uncommenting the following degrades the performance on certain sites. YMMV
    if ($query_string != "") { return 418; }

    # bypass cache for common query strings
    if ($arg_s != "") { return 418; } # search query
    if ($arg_p != "") { return 418; } # request a post / page by ID
    if ($args ~ "amp") { return 418; } # amp test
    if ($arg_preview = "true") { return 418; } # preview post / page
    if ($arg_ao_noptimize != "") { return 418; } # support for Autoptimize plugin

    if ($http_cookie ~* "wordpress_logged_in_") { return 418; }
    if ($http_cookie ~* "comment_author_") { return 418; }
    if ($http_cookie ~* "wp\-postpass_") { return 418; }

    # avoid duplicate content on Amazon CloudFront and KeyCDN.
    if ( $http_user_agent = "Amazon CloudFront" ) { return 403; access_log off; }
    if ($http_x_pull = "KeyCDN") { return 403; access_log off; }

    # uncomment the following two lines, if separate cache is generated for mobile visitors
    # if ($http_user_agent ~* "android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile)") { return 419; }
    # add_header "Vary" "User-Agent";

    try_files "/wp-content/cache/flying-press/$host${uri}index.html.gz" @fallback;

    # redirect parsing to handle headers for compressed files.
    if (-f $document_root/wp-content/cache/flying-press/$host${uri}index.html.gz) {
        rewrite ^ /wp-content/cache/flying-press/$host${uri}index.html.gz last;
    }

}

location @mobileaccess {
    try_files "/wp-content/cache/flying-press/$host${uri}index-mobile.html.gz" @fallback;

    add_header "X-Cache" "HIT - Mobile - Flying Press";
    add_header "Vary" "User-Agent, Cookie";
    # include "globals/hsts.conf";
    include 'globals/security-headers.conf';

    expires 10m;
    add_header "Cache-Control" "must-revalidate";

    # For proxies
    # add_header "Cache-Control" "s-maxage=600";
}

location @fallback {
    try_files $uri $uri/ /index.php$is_args$args;
}

